name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-verify:
    name: Python Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Syntax compile check
        run: |
          python -m compileall -q .

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff

      - name: Static analysis (fatal rules only)
        run: |
          ruff check . --output-format=github --select E9,F63,F7,F82

      - name: Run tests (if present)
        run: |
          if [ -d tests ]; then
            python -m pip install pytest
            pytest -q
          else
            echo "No tests/ directory found. Skipping pytest."
          fi

  frontend-sanity:
    name: Frontend Sanity
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required UI files exist
        run: |
          test -f densepose_web_visual.html
          test -f footprint_visual_model/index.html
          test -f footprint_visual_model/app.js

      - name: JavaScript parse checks
        run: |
          node --version
          find footprint_visual_model -type f -name "*.js" -print0 | while IFS= read -r -d '' file; do
            node --check "$file"
          done